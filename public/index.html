<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoEmail AI | Command Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        if (!localStorage.getItem('adminToken')) window.location.href = '/login.html';
    </script>
</head>
<body>
    <!-- Top Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator">
        <div class="spinner"></div>
        <span>Thinking...</span>
    </div>

    <!-- Center Confirmation Modal -->
    <div id="confirmModal" class="confirm-modal-overlay">
        <div class="modal">
            <h2 id="modalTitle">Confirm Action</h2>
            <p id="modalMessage">Are you sure you want to proceed?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Cancel</button>
                <button id="confirmActionBtn" class="btn btn-primary">Yes, Proceed</button>
            </div>
        </div>
    </div>

    <!-- Individual Send Modal -->
    <div id="individualSendModal" class="modal-overlay">
        <div class="modal" style="text-align: left; max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Send Individual Mail</h2>
                <button class="btn btn-secondary" onclick="closeModal('individualSendModal')" style="padding: 5px 10px;">✕</button>
            </div>
            
            <p style="color: var(--text-dim); margin-bottom: 20px;">Recipient: <b id="targetRecipientName" style="color: var(--primary);"></b> (<span id="targetRecipientEmail"></span>)</p>

            <div class="field-group">
                <label>Select Email Type</label>
                <select id="individualMailType" onchange="window.dashboard.updateDynamicFields()">
                    <option value="">-- Choose Campaign --</option>
                    <option value="review_feedback">📝 Review Feedback</option>
                    <option value="offer_letter">💼 Offer Letter</option>
                    <option value="certificate">🎓 Course Certificate</option>
                    <option value="first_review">🔍 First Review Schedule</option>
                    <option value="task_allocation">🚀 Task Allocation</option>
                    <option value="review_reminder">⏰ Review Reminder</option>
                    <option value="hold_mail">⏸️ Hold Mail</option>
                    <option value="weekly_schedule">🗓️ Weekly Schedule</option>
                </select>
            </div>

            <div id="dynamicFieldsContainer" style="margin-top: 20px; max-height: 300px; overflow-y: auto; padding-right: 10px;">
                <!-- Fields injected here -->
            </div>

            <div class="modal-actions" style="margin-top: 30px;">
                <button class="btn btn-secondary" onclick="closeModal('individualSendModal')">Cancel</button>
                <button id="sendIndividualBtn" class="btn btn-primary" style="flex: 1;">🚀 Send Email Now</button>
            </div>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div id="addStudentModal" class="modal-overlay">
        <div class="modal" style="text-align: left; max-width: 500px;">
            <h2>Add New Student</h2>
            <div class="field-group">
                <label>Full Name</label>
                <input type="text" id="newStudentName" placeholder="John Doe">
            </div>
            <div class="field-group">
                <label>Email Address</label>
                <input type="text" id="newStudentEmail" placeholder="john@example.com">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addStudentModal')">Cancel</button>
                <button onclick="window.dashboard.submitAddStudent()" class="btn btn-primary">Save Student</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon">🚀</div>
            AutoEmail AI
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" data-page="dashboard">🤖 Dashboard</li>
            <li class="nav-item" data-page="students">🎓 Students</li>
            <li class="nav-item" data-page="templates">🎨 Templates</li>
            <li class="nav-item" data-page="logs">📜 History</li>
        </ul>
        <div class="sidebar-footer">
            <li class="nav-item" id="logoutBtn" style="color:var(--accent-rose);">🔌 Sign Out</li>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-wrapper">
        <header>
            <h2 id="pageTitle" class="page-title">AI Command Center</h2>
            <div class="pulse-badge">Live System Pulse</div>
        </header>

        <main id="viewContainer">
            <!-- Content Injected Dyanmically -->
        </main>
    </div>

    <!-- Templates -->
    <template id="dashboardTpl">
        <div class="dashboard-container">
            <!-- Stats Ribbon -->
            <div class="stats-ribbon">
                <div class="stat-card">
                    <span class="stat-label">Total Student Base</span>
                    <span id="stat-students" class="stat-value">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Successful Transmissions</span>
                    <span id="stat-delivered" class="stat-value success">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Failed Deliveries</span>
                    <span id="stat-failed" class="stat-value danger">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Pending Schedules</span>
                    <span id="stat-scheduled" class="stat-value primary">-</span>
                </div>
            </div>

            <div class="dashboard-grid">
                <!-- AI Hub (Left/Center) -->
                <div class="card ai-hub">
                    <div class="chat-header-integrated">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="status-dot"></div>
                            <h3>AI COMMAND CENTER</h3>
                        </div>
                        <span class="ai-model-tag">Fast Hub • Qwen 2.5</span>
                    </div>
                    
                    <div id="chatMessages" class="chat-messages-integrated">
                        <div class="message system">
                            <b>Welcome back!</b> I'm your AI Automation Specialist. How can I help you manage your students today?
                            <div class="chat-hints">
                                <span>Add student Alex alex@gmail.com</span>
                                <span>Send offer letter to Alex</span>
                                <span>Send feedback to all students</span>
                            </div>
                        </div>
                    </div>

                    <div class="chat-input-integrated">
                        <input type="text" id="aiChatInput" placeholder="Write a command (e.g., 'Add a new student Sarah')...">
                        <button id="sendAiChat" class="btn-send">
                            <span class="icon">➤</span>
                        </button>
                    </div>
                </div>

                <!-- Right Interaction Panel (Summary/Logs) -->
                <div class="card activity-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>VITAL ACTIVITY</h3>
                        <button class="btn-icon" onclick="window.dashboard.refreshStats()">🔄</button>
                    </div>
                    <div id="recentLogsList" class="compact-logs">
                        <!-- Logs Injected -->
                    </div>
                    <button class="btn btn-secondary" onclick="window.dashboard.switchPage('logs')" style="width: 100%; margin-top: 20px; font-size: 12px;">View Full History</button>
                </div>
            </div>
        </div>
    </template>

    <template id="studentsTpl">
        <div class="card fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Active Student Database</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="window.dashboard.refreshAllStudents()">🔄 Refresh</button>
                    <button class="btn btn-primary" onclick="showModal('addStudentModal')">+ Add Student</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Email Address</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </template>


    <template id="templatesTpl">
        <div class="editor-container fade-in">
            <div class="card editor-card">
                <h3 style="margin-bottom: 5px;">AI Templates</h3>
                <p style="font-size: 11px; opacity: 0.5; margin-bottom: 20px;">Select a blueprint to configure automation logic.</p>
                <div id="tplList" class="tpl-list"></div>

                <div class="tpl-help-card">
                    <h4>Dynamic Variables</h4>
                    <div id="varReference">
                        <span class="var-tag">{{name}}</span>
                        <span class="var-tag">{{email}}</span>
                        <span class="var-tag">{{currentDate}}</span>
                        <span class="var-tag">{{courseName}}</span>
                        <span class="var-tag">{{jobTitle}}</span>
                        <span class="var-tag">{{deadline}}</span>
                    </div>
                    <p style="font-size: 10px; margin-top: 10px; opacity: 0.6;">Use these placeholders in your subject or body.</p>
                </div>
            </div>

            <div class="card" style="overflow-y: auto;">
                <form id="tplForm">
                    <div style="margin-bottom: 35px; border-bottom: 1px solid var(--glass-border); padding-bottom: 25px;">
                        <h2 id="editorTitle" style="font-size: 28px; margin-bottom: 8px;">Select a Template</h2>
                        <p id="editorSubtitle" style="font-size: 14px; opacity: 0.5;">Modify the email structure and logic below.</p>
                    </div>

                    <div class="editor-grid">
                        <div class="field-group">
                            <label>Display Name</label>
                            <input type="text" id="tplName" required placeholder="e.g., Course Certificate">
                        </div>
                        <div class="field-group">
                            <label>System Alias</label>
                            <input type="text" id="tplType" readonly style="opacity: 0.4; cursor: not-allowed; background: rgba(0,0,0,0.2);">
                        </div>
                    </div>

                    <div class="field-group">
                        <label>Subject Line</label>
                        <input type="text" id="tplSubject" required placeholder="Your certificate for {{courseName}}">
                    </div>

                    <div class="field-group">
                        <label>Email Markdown Body</label>
                        <textarea id="tplBody" class="code-textarea" style="min-height: 280px;" placeholder="Dear {{name}}, ..."></textarea>
                    </div>

                    <div id="pdfSection" class="hidden" style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 40px;">
                        <div class="field-group">
                            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                                <label>PDF Attachment Blueprint (HTML)</label>
                                <span style="font-size: 10px; color: var(--accent-emerald); font-weight: 600;">ENHANCED PDF ENGINE</span>
                            </div>
                            <textarea id="tplPdfHtml" class="code-textarea" style="min-height: 400px;"></textarea>
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; gap: 15px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1; height: 50px;">💾 Save Configuration Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <template id="logsTpl">
        <div class="card">
            <h2>Complete System History</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>Recipient</th><th>Template</th><th>Status</th><th>Time</th></tr></thead>
                    <tbody id="logsTableBody"></tbody>
                </table>
            </div>
        </div>
    </template>

    <script src="dashboard.js"></script>
</body>
</html>
