<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Automation - Modern Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        if (!localStorage.getItem('adminToken')) window.location.href = '/login.html';
    </script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <span style="font-size: 24px;">⚡</span> Antigravity
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" data-page="overview">📊 Dashboard</li>
            <li class="nav-item" data-page="students">🎓 Students</li>
            <li class="nav-item" data-page="templates">🎨 Templates</li>
            <li class="nav-item" data-page="actions">🚀 Actions</li>
            <li class="nav-item" data-page="scheduler">⏰ Scheduler</li>
            <li class="nav-item" data-page="logs">📜 History</li>
        </ul>
        <div class="sidebar-footer">
            <li class="nav-item" id="logoutBtn" style="color:var(--accent-red);">🔌 Sign Out</li>
        </div>
    </nav>

    <div class="main-wrapper">
        <header>
            <h2 id="pageTitle">Dashboard Home</h2>
            <div id="statusIndicator" class="badge badge-success">Online</div>
        </header>

        <!-- Pages Container -->
        <main id="viewContainer" class="page fade-in">
            <!-- Content dynamically injected here -->
        </main>
    </div>

    <!-- Template Fragments (Hidden) -->
    <template id="overviewTpl">
        <div class="dashboard-stats">
            <div class="card stat-card"><h3>Total Users</h3><div class="value" id="stat-users">-</div></div>
            <div class="card stat-card"><h3>Delivered</h3><div class="value" style="color:var(--accent-green);" id="stat-delivered">-</div></div>
            <div class="card stat-card"><h3>Failures</h3><div class="value" style="color:var(--accent-red);" id="stat-failed">-</div></div>
            <div class="card stat-card"><h3>Scheduled</h3><div class="value" style="color:var(--primary);" id="stat-scheduled">-</div></div>
        </div>
        <div class="card">
            <h3>Recent System Activity</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Reciepient</th><th>Type</th><th>Status</th><th>Time</th></tr></thead>
                    <tbody id="recentLogsList"></tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="studentsTpl">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Active Students</h2>
                <button class="btn btn-primary" onclick="window.dashboard.refreshAllStudents()">🔄 Sync Students</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th style="width: 250px;">Feedback</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="schedulerTpl">
        <div class="card" style="margin-bottom: 30px;">
            <h2>Dynamic Worker Controls</h2>
            <p style="color:var(--text-dim); margin-bottom: 20px;">Manage backend cron tasks without restarting the server.</p>
            <div id="cronListContainer"></div>
        </div>
        <div class="card">
            <h2>Pending Action Tasks</h2>
            <div class="table-container">
                <table id="scheduledTable">
                    <thead><tr><th>Type</th><th>Recipient</th><th>Time</th><th>Action</th></tr></thead>
                    <tbody id="pendingTasksList"></tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="templatesTpl">
        <div style="display: grid; grid-template-columns: 320px 1fr; gap: 30px;">
            <div class="card" style="height: calc(100vh - 200px); overflow-y: auto;">
                <h3>Templates</h3>
                <div id="tplList" style="margin-top: 20px;"></div>
            </div>
            <div class="card">
                <form id="tplForm">
                    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                        <input type="text" id="tplName" placeholder="Template Name" required>
                        <input type="text" id="tplType" placeholder="Tpl Key (e.g. certificate)" readonly>
                    </div>
                    <input type="text" id="tplSubject" placeholder="Email Subject" required style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 10px; color: var(--text-dim);">Body Content (HTML/Text)</label>
                    <textarea id="tplBody" style="height: 300px; margin-bottom: 20px;"></textarea>
                    
                    <div style="border-top:1px solid var(--glass-border); padding-top:20px;">
                        <label class="btn btn-secondary" style="width: fit-content;">
                            <input type="checkbox" id="tplHasAttachment"> Incl. PDF Attachment (Backend Generated)
                        </label>
                        <div id="pdfContentSection" class="hidden" style="margin-top: 20px;">
                            <label style="display: block; margin-bottom: 10px; color: var(--text-dim);">PDF Template HTML (Admin Edit Only)</label>
                            <textarea id="tplPdfHtml" style="height: 200px;"></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="margin-top: 30px; width: 100%;">Save Configuration ✅</button>
                </form>
            </div>
        </div>
    </template>

    <template id="actionsTpl">
        <div class="dashboard-stats">
            <div class="card"><h3>Offer Letter 💼</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('offer_letter')">Bulk Fire</button></div>
            <div class="card"><h3>Certificate 🎓</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('certificate')">Bulk Fire</button></div>
            <div class="card"><h3>Assign Task 📋</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('task_assignment')">Bulk Fire</button></div>
            <div class="card"><h3>Hold Mail ⏸️</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('hold_mail')">Bulk Fire</button></div>
        </div>
        <!-- Row 2 -->
        <div class="dashboard-stats" style="margin-top: 20px;">
            <div class="card"><h3>Scholarship 🎊</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('scholarship')">Bulk Fire</button></div>
            <div class="card"><h3>Rejection 🛑</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('rejection')">Bulk Fire</button></div>
            <div class="card"><h3>Welcome 🚀</h3><button class="btn btn-secondary" onclick="window.dashboard.triggerBulk('welcome_mail')">Bulk Fire</button></div>
            <div class="card"><h3>Sync All 🔄</h3><button class="btn btn-primary" onclick="window.dashboard.triggerBulk('notification')">Standard Update</button></div>
        </div>
    </template>

    <template id="logsTpl">
        <div class="card">
            <h2>Full Execution History</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>Reciepient</th><th>Template</th><th>Status</th><th>Error</th><th>Time</th></tr></thead>
                    <tbody id="logsTableBody"></tbody>
                </table>
            </div>
        </div>
    </template>

    <script src="dashboard.js"></script>
</body>
</html>
