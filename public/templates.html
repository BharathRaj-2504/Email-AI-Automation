<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Manager - Email AI Automation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.href = '/login.html';
        }
    </script>
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header style="position: relative;">
            <h1>Template Manager</h1>
            <p>Design and customize your dynamic email templates</p>
            <div style="position: absolute; right: 0; top: 0; display: flex; gap: 10px;">
                <a href="index.html" class="secondary icon-btn" style="padding: 10px 20px; font-size: 0.9rem; text-decoration: none;">Dashboard 🏠</a>
                <button id="logoutBtn" class="secondary icon-btn" style="padding: 10px 20px; font-size: 0.9rem;" title="Logout">Logout</button>
            </div>
        </header>

        <div class="template-grid">
            <!-- Sidebar: Template List -->
            <aside class="card glass template-list-card">
                <div class="section-header">
                    <h2>Email Templates</h2>
                    <button id="newTemplateBtn" class="icon-btn" title="Create New">+</button>
                </div>
                <div id="templateList">
                    <div class="loader" style="margin: 20px auto;"></div>
                </div>
            </aside>

            <!-- Main: Editor -->
            <main id="editorContainer" class="card glass">
                <form id="templateForm">
                    <div class="dashboard-grid" style="margin-bottom: 20px;">
                        <article>
                            <label class="preview-label">Internal Name</label>
                            <div class="input-group">
                                <input type="text" id="tplName" placeholder="e.g. Welcome Certificate" required>
                            </div>
                        </article>
                        <article>
                            <label class="preview-label">Template Type (Key)</label>
                            <div class="input-group">
                                <select id="tplType" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: white;">
                                    <option value="notification">Notification</option>
                                    <option value="certificate">Certificate</option>
                                    <option value="offer_letter">Offer Letter</option>
                                    <option value="review">Review</option>
                                    <option value="custom">Custom</option>
                                </select>
                            </div>
                        </article>
                    </div>

                    <div class="input-group">
                        <label for="tplSubject">Email Subject</label>
                        <input type="text" id="tplSubject" placeholder="Welcome aboard {{name}}!" required>
                    </div>

                    <!-- Body Editor -->
                    <div class="editor-preview-split">
                        <section class="code-area">
                            <label class="preview-label">Email Body (Markdown/Text)</label>
                            <textarea id="tplBody" placeholder="Hello {{name}}, welcome to our platform!"></textarea>
                        </section>
                        <section class="code-area">
                            <label class="preview-label">Body Preview</label>
                            <div id="bodyPreview" class="preview-area"></div>
                        </section>
                    </div>

                    <div class="input-group" style="margin-top: 24px;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="tplHasAttachment"> Include PDF Attachment
                        </label>
                    </div>

                    <!-- PDF Editor (Conditional) -->
                    <div id="pdfEditorSection" class="hidden">
                        <div class="editor-preview-split">
                            <section class="code-area">
                                <label class="preview-label">PDF HTML Content</label>
                                <textarea id="tplPdfHtml" placeholder="<div style='text-align:center;'><h1>Certificate for {{name}}</h1></div>"></textarea>
                            </section>
                            <section class="code-area" style="position: relative;">
                                <label class="preview-label">PDF Layout Preview</label>
                                <div id="pdfPreview" class="preview-area"></div>
                            </section>
                        </div>
                    </div>

                    <div style="margin-top: 30px; display: flex; gap: 12px;">
                        <button type="submit" id="saveBtn">
                            <span class="btn-text">Save Template ✅</span>
                            <div class="loader hidden"></div>
                        </button>
                    </div>
                </form>
                <div id="statusMessage" class="status-box hidden" style="margin-top: 20px;"></div>
            </main>
        </div>
    </div>
    <script src="templates.js"></script>
</body>
</html>
